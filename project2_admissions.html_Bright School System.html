<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="admissions.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container header-container">
            <div class="logo">
                <h2>🎓 Bright Future School</h2>
            </div>

            <nav>
                <ul>
                    <li><a href="./index.html">Home</a></li>
                    <li><a href="./about.html">About</a></li>
                    <li><a href="./admission.html">Admissions</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- ================= Admission Section ================= -->
    <section class="admission">
        <div class="container">
            <h2 class="section-title">Admission Form</h2>

            <div class="admission-container">

                <!-- Form -->
                <form class="admission-form">
                    <input type="text" placeholder="Student Name" required>
                    <input type="text" placeholder="Father Name" required>
                    <input type="email" placeholder="Email" required>
                    <input type="tel" placeholder="Phone" required>

                    <select required>
                        <option value="">Select Class</option>
                        <option>Primary</option>
                        <option>Secondary</option>
                        <option>Higher Secondary</option>
                    </select>

                    <textarea rows="4" placeholder="Message"></textarea>

                    <button type="submit">Submit Application</button>
                </form>

                <!-- Contact Info -->
                <div class="contact-info">
                    <h3>Contact Information</h3>
                    <p><strong>Address:</strong> Main Street, City, Pakistan</p>
                    <p><strong>Phone:</strong> 0300-1234567</p>
                    <p><strong>Email:</strong> info@brightfuture.com</p>
                </div>

            </div>
        </div>
    </section>
</body>
</html>
